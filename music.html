<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎵 Music Finder 🎵</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Segoe UI', 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 25%, #e3f2fd 50%, #fff3e0 75%, #f3e5f5 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding-bottom: 30px;
  }

  .header {
    background: linear-gradient(135deg, #ff6f91, #ff9671, #ffc75f, #f9f871);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .header h1 {
    font-size: 1.6em;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .search-box {
    position: relative;
    max-width: 500px;
    margin: 0 auto;
  }

  .search-box input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    font-size: 17px;
    border: 3px solid #fff;
    border-radius: 50px;
    outline: none;
    background: rgba(255,255,255,0.95);
    color: #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s;
  }

  .search-box input:focus {
    border-color: #ff6f91;
    box-shadow: 0 4px 20px rgba(255,111,145,0.3);
  }

  .search-box input::placeholder {
    color: #bbb;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    pointer-events: none;
  }

  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: #ff6f91;
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    display: none;
    line-height: 28px;
    text-align: center;
  }

  .clear-btn.show { display: block; }

  .stats {
    text-align: center;
    padding: 10px 16px;
    color: #777;
    font-size: 14px;
  }

  .stats span { 
    background: rgba(255,111,145,0.12);
    padding: 3px 12px;
    border-radius: 20px;
    color: #e91e63;
    font-weight: 600;
  }

  .list-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 12px;
  }

  .music-item {
    display: flex;
    align-items: flex-start;
    background: white;
    border-radius: 16px;
    margin-bottom: 8px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
    gap: 12px;
    border-left: 4px solid transparent;
    cursor: default;
  }

  .music-item:active {
    transform: scale(0.98);
  }

  .music-item:nth-child(6n+1) { border-left-color: #ff6f91; }
  .music-item:nth-child(6n+2) { border-left-color: #ff9671; }
  .music-item:nth-child(6n+3) { border-left-color: #ffc75f; }
  .music-item:nth-child(6n+4) { border-left-color: #68d391; }
  .music-item:nth-child(6n+5) { border-left-color: #63b3ed; }
  .music-item:nth-child(6n+6) { border-left-color: #b794f4; }

  .num {
    flex-shrink: 0;
    min-width: 52px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-weight: 800;
    font-size: 17px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(102,126,234,0.3);
    letter-spacing: 0.5px;
    user-select: all;
  }

  .info {
    flex: 1;
    min-width: 0;
  }

  .folder {
    font-size: 11px;
    color: #999;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .name {
    font-size: 15px;
    color: #333;
    line-height: 1.35;
    word-break: break-word;
  }

  .name mark {
    background: #fff176;
    color: #333;
    border-radius: 3px;
    padding: 0 2px;
  }

  .folder mark {
    background: #fff176;
    color: #777;
    border-radius: 3px;
    padding: 0 1px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 18px;
  }

  .no-results .emoji {
    font-size: 64px;
    display: block;
    margin-bottom: 16px;
  }

  .jump-top {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6f91, #ff9671);
    color: white;
    border: none;
    font-size: 22px;
    box-shadow: 0 4px 15px rgba(255,111,145,0.4);
    cursor: pointer;
    display: none;
    z-index: 99;
    line-height: 48px;
    text-align: center;
  }

  .jump-top.show { display: block; }

  /* Number search mode highlight */
  .music-item.exact-match {
    background: #fffde7;
    box-shadow: 0 2px 12px rgba(255,199,95,0.3);
    border-left-color: #ffc75f !important;
  }
  .music-item.exact-match .num {
    background: linear-gradient(135deg, #f57c00, #ff9800);
    font-size: 20px;
    box-shadow: 0 2px 10px rgba(245,124,0,0.4);
  }

  /* Loading placeholder */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }

  .loading .spinner {
    font-size: 48px;
    animation: spin 2s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Cute footer */
  .footer {
    text-align: center;
    padding: 24px 16px 12px;
    color: #ccc;
    font-size: 12px;
  }

  /* Responsive tweaks */
  @media (max-width: 400px) {
    .header h1 { font-size: 1.3em; }
    .search-box input { font-size: 16px; padding: 12px 18px 12px 42px; }
    .num { min-width: 46px; height: 40px; font-size: 15px; }
    .name { font-size: 14px; }
    .music-item { padding: 10px 12px; }
  }

  /* Virtual scroll sentinel */
  .sentinel { height: 1px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎵 Music Finder 🎶</h1>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search song name or number..." autocomplete="off" autofocus>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="list-container" id="list"></div>

<button class="jump-top" id="jumpTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div class="footer">🎧 Tap the number → enter it in your MP3 player!</div>

// Vietnamese diacritics removal for search
function removeDiacritics(str) {
  // đ/Đ are standalone letters, replace before decomposing
  return str.replace(/đ/g, "d").replace(/Đ/g, "D")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}
function normalize(str) {
  return removeDiacritics(str).toLowerCase();
}

// Pre-process: split into folder + filename, strip .mp3
const entries = DATA.map((raw, i) => {
  // NFC-normalize so each visual character = 1 JS char (fixes macOS NFD filenames)
  raw = raw.normalize("NFC");
  const slashIdx = raw.lastIndexOf("/");
  let folder = "", name = raw;
  if (slashIdx !== -1) {
    folder = raw.substring(0, slashIdx);
    name = raw.substring(slashIdx + 1);
  }
  // Remove .mp3 / .MP3 extension
  name = name.replace(/\.mp[34]$/i, "").replace(/\.mp4\.mp3$/i, "");
  return { num: i + 1, folder, name, raw,
    normName: normalize(name), normFolder: normalize(folder), normFull: normalize(raw) };
});

// Fuzzy match: checks if all characters of query appear in text in order
// Uses normalized (diacritics-free) versions for comparison, returns indices on original text
function fuzzyMatch(text, query, normText, normQuery) {
  normText = normText || normalize(text);
  normQuery = normQuery || normalize(query);
  const tLen = normText.length, qLen = normQuery.length;
  if (qLen === 0) return { matched: true, score: 0, indices: [] };
  if (qLen > tLen) return { matched: false };

  const indices = [];
  let ti = 0, qi = 0;

  while (ti < tLen && qi < qLen) {
    if (normText[ti] === normQuery[qi]) {
      indices.push(ti);
      qi++;
    }
    ti++;
  }
  if (qi !== qLen) return { matched: false };

  // Scoring: prefer consecutive matches, matches at start, word boundaries
  let score = 0;
  let prevIdx = -2;
  for (let k = 0; k < indices.length; k++) {
    const idx = indices[k];
    // Consecutive bonus
    if (idx === prevIdx + 1) score += 10;
    // Start of string bonus
    if (idx === 0) score += 15;
    // Word boundary bonus (after space, -, _, .)
    if (idx > 0 && /[\s\-_.\/,]/.test(text[idx - 1])) score += 8;
    // Exact diacritics match bonus (user typed exact Vietnamese char)
    if (text[idx].normalize("NFC").toLowerCase() === (query[k] || "").normalize("NFC").toLowerCase()) score += 2;
    // Penalize gaps
    if (prevIdx >= 0) {
      const gap = idx - prevIdx - 1;
      score -= gap * 0.5;
    }
    prevIdx = idx;
  }
  // Penalize long texts slightly
  score -= (tLen - qLen) * 0.1;

  return { matched: true, score, indices };
}

// Highlight text at given indices
function highlightText(text, indices) {
  if (!indices || indices.length === 0) return escapeHtml(text);
  const set = new Set(indices);
  let result = "";
  let inMark = false;
  for (let i = 0; i < text.length; i++) {
    if (set.has(i)) {
      if (!inMark) { result += "<mark>"; inMark = true; }
      result += escapeHtml(text[i]);
    } else {
      if (inMark) { result += "</mark>"; inMark = false; }
      result += escapeHtml(text[i]);
    }
  }
  if (inMark) result += "</mark>";
  return result;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let currentResults = entries;
let renderBatch = 0;
const BATCH_SIZE = 80;

function renderList(results, query) {
  currentResults = results;
  renderBatch = 0;
  listEl.innerHTML = "";

  if (results.length === 0) {
    listEl.innerHTML = '<div class="no-results"><span class="emoji">🎵</span>No songs found!<br><small>Try a different search</small></div>';
    statsEl.innerHTML = "";
    return;
  }

  statsEl.innerHTML = query
    ? 'Found <span>' + results.length + '</span> song' + (results.length !== 1 ? 's' : '')
    : '<span>' + results.length + '</span> songs total 🎶';

  renderMore(query);
}

function renderMore(query) {
  const start = renderBatch * BATCH_SIZE;
  const end = Math.min(start + BATCH_SIZE, currentResults.length);
  if (start >= currentResults.length) return;

  const frag = document.createDocumentFragment();
  const isNumSearch = /^\d+$/.test(query);

  for (let i = start; i < end; i++) {
    const e = currentResults[i];
    const div = document.createElement("div");
    div.className = "music-item";
    if (isNumSearch && String(e.num) === query) div.className += " exact-match";

    let nameHtml, folderHtml;
    if (e._nameIndices) {
      nameHtml = highlightText(e.name, e._nameIndices);
    } else {
      nameHtml = escapeHtml(e.name);
    }
    if (e._folderIndices) {
      folderHtml = highlightText(e.folder, e._folderIndices);
    } else {
      folderHtml = escapeHtml(e.folder);
    }

    div.innerHTML = '<div class="num">' + e.num + '</div>' +
      '<div class="info">' +
        (e.folder ? '<div class="folder">📁 ' + folderHtml + '</div>' : '') +
        '<div class="name">🎵 ' + nameHtml + '</div>' +
      '</div>';
    frag.appendChild(div);
  }

  listEl.appendChild(frag);
  renderBatch++;

  // Infinite scroll sentinel
  if (end < currentResults.length) {
    if (!document.getElementById("sentinel")) {
      const sentinel = document.createElement("div");
      sentinel.id = "sentinel";
      sentinel.className = "sentinel";
      listEl.appendChild(sentinel);
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          obs.disconnect();
          const s = document.getElementById("sentinel");
          if (s) s.remove();
          renderMore(query);
        }
      });
      obs.observe(sentinel);
    }
  }
}

function doSearch(query) {
  query = query.trim().normalize("NFC");
  clearBtn.className = "clear-btn" + (query ? " show" : "");

  if (!query) {
    // Reset highlights
    entries.forEach(e => { e._nameIndices = null; e._folderIndices = null; });
    renderList(entries, "");
    return;
  }

  // If query is purely a number, prioritize exact number match
  const isNumQuery = /^\d+$/.test(query);
  const numQuery = isNumQuery ? parseInt(query) : 0;

  const results = [];
  const normQuery = normalize(query);

  for (const e of entries) {
    // Exact number match
    if (isNumQuery && String(e.num) === query) {
      e._nameIndices = null;
      e._folderIndices = null;
      results.push({ entry: e, score: 100000 });
      continue;
    }

    // Number starts-with match
    if (isNumQuery && String(e.num).startsWith(query)) {
      e._nameIndices = null;
      e._folderIndices = null;
      results.push({ entry: e, score: 50000 - e.num });
      continue;
    }

    // Fuzzy match on name (using pre-computed normalized text)
    const nameMatch = fuzzyMatch(e.name, query, e.normName, normQuery);
    // Fuzzy match on folder
    const folderMatch = fuzzyMatch(e.folder, query, e.normFolder, normQuery);
    // Substring match bonus (on normalized text)
    const substringBonus = e.normFull.includes(normQuery) ? 200 : 0;

    if (nameMatch.matched || folderMatch.matched || substringBonus > 0) {
      let bestScore = -999;
      let nameIndices = null, folderIndices = null;

      if (nameMatch.matched) {
        bestScore = Math.max(bestScore, nameMatch.score);
        nameIndices = nameMatch.indices;
      }
      if (folderMatch.matched && folderMatch.score > bestScore) {
        bestScore = folderMatch.score;
        folderIndices = folderMatch.indices;
        if (!nameMatch.matched) nameIndices = null;
      }
      
      // If substring match, also compute name indices for highlighting
      if (substringBonus > 0 && !nameMatch.matched) {
        const idx = e.normName.indexOf(normQuery);
        if (idx !== -1) {
          nameIndices = [];
          for (let k = 0; k < normQuery.length; k++) nameIndices.push(idx + k);
        }
      }

      bestScore += substringBonus;
      e._nameIndices = nameIndices;
      e._folderIndices = folderIndices;
      results.push({ entry: e, score: bestScore });
    }
  }

  results.sort((a, b) => b.score - a.score);
  renderList(results.map(r => r.entry), query);
}

function clearSearch() {
  searchInput.value = "";
  searchInput.focus();
  doSearch("");
}

// Debounced search
let searchTimer;
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value), 120);
});

// Scroll to top button
window.addEventListener("scroll", () => {
  jumpTopBtn.className = "jump-top" + (window.scrollY > 400 ? " show" : "");
}, { passive: true });

// Initial render
doSearch("");
</script>
